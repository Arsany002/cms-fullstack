# ─────────────────────────────────────────────────────────────────────────────
# Reverse proxy – routes traffic between frontend and backend containers.
#
#   /api/*  →  cms_backend   (Laravel PHP-FPM + Nginx)
#   /*      →  cms_frontend  (React SPA / Nginx)
#
# Because both frontend JS and the API share the same origin (http://localhost),
# the browser never issues a cross-origin request → no CORS headers needed here.
# ─────────────────────────────────────────────────────────────────────────────

upstream backend {
    server cms_backend:80;
    keepalive 32;
}

upstream frontend {
    server cms_frontend:5173;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"              always;
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header X-XSS-Protection       "1; mode=block"           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Health / readiness probe ────────────────────────────────────────────
    location = /up {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ── API traffic → Laravel backend ──────────────────────────────────────
    location /api {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Swagger / API docs → Laravel backend ───────────────────────────────
    location /api-documentation {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Everything else → React SPA ────────────────────────────────────────
    location / {
        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Support Vite HMR WebSocket in dev (no-op in prod)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
