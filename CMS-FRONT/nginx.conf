# ─────────────────────────────────────────────────────────────────────────────
# Frontend Nginx config – serves the compiled React SPA.
#
# Key behaviour:
#   • All unknown paths fall back to index.html so React Router handles them.
#   • Static assets (JS/CSS/images) get long-lived cache headers.
#   • Gzip is enabled for text assets.
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml;

    # ── Vite hashed assets – immutable cache (1 year) ───────────────────────
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── SPA fallback – all routes served by index.html ───────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # Prevent caching of index.html itself (the entry point)
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
