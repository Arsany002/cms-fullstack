# ─────────────────────────────────────────────────────────────────────────────
# Development overrides  (docker-compose.override.yml)
#
# Applied automatically when you run:
#   docker compose up
#
# What changes vs. production:
#   • cms_backend   → exposed on host port 8000, opcache disabled
#   • cms_frontend  → replaced with Vite dev server (HMR) on host port 5173
#                     source is volume-mounted for instant reload
#   • cms_proxy     → disabled (each service gets its own port, CORS handles it)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # Disable the proxy in dev – services are accessed directly on their ports
  cms_proxy:
    profiles:
      - production-only   # never starts in plain `docker compose up`

  # ── Backend – expose on port 8000 and tweak for dev ──────────────────────
  cms_backend:
    environment:
      APP_ENV:   local
      APP_DEBUG: "true"
      # CORS must allow the Vite dev server origin
      FRONTEND_URL: "http://localhost:5173"
    ports:
      - "${BACKEND_PORT:-8000}:80"
    # Override OPcache validate_timestamps so PHP picks up file changes
    volumes:
      - cms_storage:/var/www/html/storage/app
      - cms_logs:/var/www/html/storage/logs
      - ./CMS-BACK/docker/php/opcache.dev.ini:/usr/local/etc/php/conf.d/opcache.ini:ro

  # ── Frontend – Vite dev server with hot-module replacement ────────────────
  cms_frontend:
    # Drop the production build entirely
    build:
      context: ./CMS-FRONT
      dockerfile: Dockerfile
      target: development
    container_name: cms_frontend_dev
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      # Mount source for HMR
      - ./CMS-FRONT:/app
      # Isolate node_modules inside the container (avoids host/container mismatch)
      - /app/node_modules
    environment:
      # Absolute URL because dev frontend talks directly to backend, bypassing proxy
      VITE_API_BASE_URL: "http://localhost:${BACKEND_PORT:-8000}/api/v1"
    networks:
      - cms_network
