# ─────────────────────────────────────────────────────────────────────────────
# Clinic Management System – unified compose (PRODUCTION)
#
# Topology:
#   Browser → cms_proxy:80
#               ├─ /api/* ──► cms_backend:80  (PHP-FPM + Nginx)
#               └─ /*    ──► cms_frontend:80 (React SPA / Nginx)
#
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d
#   # App is served at http://localhost
#
# For development mode (Vite HMR + backend on separate ports):
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Reverse proxy ─────────────────────────────────────────────────────────
  cms_proxy:
    image: nginx:1.27-alpine
    container_name: cms_proxy
    restart: unless-stopped
    ports:
      - "${PROXY_PORT:-80}:80"
    volumes:
      - ./docker/proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      cms_backend:
        condition: service_healthy
      cms_frontend:
        condition: service_started
    networks:
      - cms_network

  # ── Backend (PHP-FPM + Nginx managed by Supervisord) ──────────────────────
  cms_backend:
    build:
      context: ./CMS-BACK
      dockerfile: Dockerfile
      target: production
    container_name: cms_backend
    restart: unless-stopped
    environment:
      APP_NAME:           "${APP_NAME:-CMS}"
      APP_ENV:            "${APP_ENV:-production}"
      APP_KEY:            "${APP_KEY}"
      APP_DEBUG:          "${APP_DEBUG:-false}"
      APP_URL:            "${APP_URL:-http://localhost}"
      # In the proxy setup, frontend & backend share origin → CORS is not
      # required, but we still set it so the value is correct if someone
      # bypasses the proxy during development.
      FRONTEND_URL:       "${FRONTEND_URL:-http://localhost}"
      DB_CONNECTION:      mysql
      DB_HOST:            cms_db
      DB_PORT:            3306
      DB_DATABASE:        "${DB_DATABASE:-cms_clinic}"
      DB_USERNAME:        "${DB_USERNAME:-cms_user}"
      DB_PASSWORD:        "${DB_PASSWORD}"
      REDIS_HOST:         cms_redis
      REDIS_PORT:         6379
      REDIS_PASSWORD:     "${REDIS_PASSWORD}"
      CACHE_STORE:        redis
      QUEUE_CONNECTION:   redis
      SESSION_DRIVER:     redis
      PASSPORT_PERSONAL_ACCESS_CLIENT_ID:     "${PASSPORT_CLIENT_ID}"
      PASSPORT_PERSONAL_ACCESS_CLIENT_SECRET: "${PASSPORT_CLIENT_SECRET}"
      MAIL_MAILER:        "${MAIL_MAILER:-log}"
      MAIL_HOST:          "${MAIL_HOST:-localhost}"
      MAIL_PORT:          "${MAIL_PORT:-2525}"
      MAIL_USERNAME:      "${MAIL_USERNAME:-null}"
      MAIL_PASSWORD:      "${MAIL_PASSWORD:-null}"
      MAIL_FROM_ADDRESS:  "${MAIL_FROM_ADDRESS:-hello@example.com}"
    volumes:
      - cms_storage:/var/www/html/storage/app
      - cms_logs:/var/www/html/storage/logs
    depends_on:
      cms_db:
        condition: service_healthy
      cms_redis:
        condition: service_healthy
    networks:
      - cms_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ── Queue worker ─────────────────────────────────────────────────────────
  cms_queue:
    build:
      context: ./CMS-BACK
      dockerfile: Dockerfile
      target: production
    container_name: cms_queue
    restart: unless-stopped
    # Override the supervisord entrypoint with a simple queue:work command
    entrypoint: []
    command:
      - php
      - artisan
      - queue:work
      - redis
      - --sleep=3
      - --tries=3
      - --max-time=3600
    environment:
      APP_ENV:          "${APP_ENV:-production}"
      APP_KEY:          "${APP_KEY}"
      APP_URL:          "${APP_URL:-http://localhost}"
      DB_CONNECTION:    mysql
      DB_HOST:          cms_db
      DB_DATABASE:      "${DB_DATABASE:-cms_clinic}"
      DB_USERNAME:      "${DB_USERNAME:-cms_user}"
      DB_PASSWORD:      "${DB_PASSWORD}"
      REDIS_HOST:       cms_redis
      REDIS_PASSWORD:   "${REDIS_PASSWORD}"
      QUEUE_CONNECTION: redis
      CACHE_STORE:      redis
      PASSPORT_PERSONAL_ACCESS_CLIENT_ID:     "${PASSPORT_CLIENT_ID}"
      PASSPORT_PERSONAL_ACCESS_CLIENT_SECRET: "${PASSPORT_CLIENT_SECRET}"
    depends_on:
      cms_backend:
        condition: service_healthy
    networks:
      - cms_network

  # ── Scheduler ────────────────────────────────────────────────────────────
  cms_scheduler:
    build:
      context: ./CMS-BACK
      dockerfile: Dockerfile
      target: production
    container_name: cms_scheduler
    restart: unless-stopped
    entrypoint: []
    command:
      - sh
      - -c
      - |
        while true; do
          php artisan schedule:run --verbose --no-interaction
          sleep 60
        done
    environment:
      APP_ENV:          "${APP_ENV:-production}"
      APP_KEY:          "${APP_KEY}"
      APP_URL:          "${APP_URL:-http://localhost}"
      DB_CONNECTION:    mysql
      DB_HOST:          cms_db
      DB_DATABASE:      "${DB_DATABASE:-cms_clinic}"
      DB_USERNAME:      "${DB_USERNAME:-cms_user}"
      DB_PASSWORD:      "${DB_PASSWORD}"
      REDIS_HOST:       cms_redis
      REDIS_PASSWORD:   "${REDIS_PASSWORD}"
      CACHE_STORE:      redis
      PASSPORT_PERSONAL_ACCESS_CLIENT_ID:     "${PASSPORT_CLIENT_ID}"
      PASSPORT_PERSONAL_ACCESS_CLIENT_SECRET: "${PASSPORT_CLIENT_SECRET}"
    depends_on:
      cms_backend:
        condition: service_healthy
    networks:
      - cms_network

  # ── Frontend (React SPA served by Nginx) ─────────────────────────────────
  cms_frontend:
    build:
      context: ./CMS-FRONT
      dockerfile: Dockerfile
      target: production
      args:
        # Relative URL – the proxy rewrites /api/* to the backend.
        # No absolute host needed; works on any domain in production.
        VITE_API_BASE_URL: /api/v1
    container_name: cms_frontend
    restart: unless-stopped
    networks:
      - cms_network

  # ── Startup announcement ─────────────────────────────────────────────────
    # ── Startup announcement ─────────────────────────────────────────────────
  cms_announce:
    image: alpine:3.20
    container_name: cms_announce
    restart: "no"
    command:
      - sh
      - -c
      - |
        PROXY_LINK="http://localhost"
        FRONTEND_LINK="http://localhost:5173"
        BACKEND_LINK="http://localhost:8000/api/v1"

        if [ "$$PROXY_PORT" != "80" ] && [ -n "$$PROXY_PORT" ]; then
          PROXY_LINK="http://localhost:$$PROXY_PORT"
        fi

        echo ""
        echo "╔════════════════════════════════════════════════════╗"
        echo "║              CMS is up and running!               ║"
        echo "╠════════════════════════════════════════════════════╣"
        printf "║  Production app:   %-31s║\n" "$$PROXY_LINK"
        printf "║  Dev frontend:     %-31s║\n" "$$FRONTEND_LINK"
        printf "║  Dev backend API:  %-31s║\n" "$$BACKEND_LINK"
        echo "╠════════════════════════════════════════════════════╣"
        echo "║  Check containers: docker compose ps              ║"
        echo "║  View logs:        docker compose logs -f         ║"
        echo "╚════════════════════════════════════════════════════╝"
        echo ""
    environment:
      PROXY_PORT: "${PROXY_PORT:-80}"
    depends_on:
      cms_backend:
        condition: service_healthy
      cms_frontend:
        condition: service_started
    networks:
      - cms_network

  # ── MySQL ─────────────────────────────────────────────────────────────────
  cms_db:
    image: mysql:8.4
    container_name: cms_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE:      "${DB_DATABASE:-cms_clinic}"
      MYSQL_USER:          "${DB_USERNAME:-cms_user}"
      MYSQL_PASSWORD:      "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - cms_db_data:/var/lib/mysql
    networks:
      - cms_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  cms_redis:
    image: redis:7.4-alpine
    container_name: cms_redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${REDIS_PASSWORD}"
    volumes:
      - cms_redis_data:/data
    networks:
      - cms_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  cms_db_data:
  cms_redis_data:
  cms_storage:
  cms_logs:

# ─── Shared network ───────────────────────────────────────────────────────────
networks:
  cms_network:
    driver: bridge
